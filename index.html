<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show do Telecom</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="start-screen" class="screen">
        <div class="logo-container">
            <img src="logo.png" alt="Show do Telecom" class="main-logo">
        </div>
        <p class="start-subtext">Você consegue chegar ao 1 milhão de pontos sem trapacear?</p>
        <div class="input-group">
            <input type="text" id="player-name" placeholder="Digite seu nome para começar..." autocomplete="off">
        </div>
        <button id="btn-start" class="btn-primary">Começar</button>
        <p class="credits">
            Jogo criado por <strong>Higor Cesar</strong>
        </p>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="background-tunnel"></div>
        
        <div class="game-container">
            <div class="main-panel">



                <div class="question-box">
                    <p id="question-text">Carregando pergunta...</p>
                </div>

                <div class="options-grid" id="options-container">
                    <!-- Options generated by JS -->
                </div>

                <div class="helpers-bar">
                    <button id="btn-cards" class="btn-helper" onclick="useCards()">
                        <span class="icon">🃏</span> Cartas
                    </button>
                    <button id="btn-skip" class="btn-helper" onclick="useSkip()">
                        <span class="icon">⏭️</span> Pular (<span id="skips-left">3</span>)
                    </button>
                    <button id="btn-stop" class="btn-helper" onclick="stopGame()">
                        <span class="icon">🛑</span> Parar
                    </button>
                </div>
            </div>

            <div class="side-panel">
                <div class="progress-bar">
                    <h3>PERGUNTA <span id="current-question-num">1</span>/15</h3>
                </div>
                <div class="host-container">
                    <div id="host-avatar" class="host-thinking"></div>
                </div>
                <div class="timer-container">
                    <span id="timer-text">20</span>
                </div>
            </div>
        </div>
    </div>

    <div id="end-screen" class="screen hidden">
        <div class="celebration-container hidden" id="celebration-box">
            <img src="celebration.png" alt="Parabéns" class="celebration-img">
        </div>
        <h1 id="end-title">FIM DE JOGO</h1>
        <h2 id="end-subtitle">Você ganhou:</h2>
        <h1 id="end-prize" class="final-prize">0 PONTOS</h1>
        <button id="btn-restart" class="btn-primary" onclick="location.reload()">JOGAR NOVAMENTE</button>
    </div>

    <!-- Audios -->
    <!-- Os caminhos estão apontando para os arquivos na mesma pasta. -->
    <audio id="audio-start" src="game-start-01.mp3"></audio>
    <audio id="audio-wrong" src="wrong-answer.mp3"></audio>
    <audio id="audio-correct" src="player-won.mp3"></audio>
    <audio id="audio-gong" src="showing-question-gong.mp3"></audio>
    <audio id="audio-cards" src="cards-elimination-shuffling.mp3"></audio>
    <audio id="audio-background-1" src="music-01-base.mp3" loop></audio>
    <audio id="audio-background-2" src="music-02-base.mp3" loop></audio>
    <audio id="audio-waiting" src="waiting-confirmation-1.mp3"></audio>
    <audio id="speech-certa" src="falas/certa-resposta.mp3"></audio>
    <audio id="speech-disso" src="falas/silvio-santos-esta-certo-disso.mp3"></audio>
    <audio id="speech-errada" src="falas/silvio-santos-resposta-errada.mp3"></audio>
    <audio id="speech-tempo" src="falas/silvio-santos-o-seu-tempo-acabou.mp3"></audio>
    <audio id="audio-win-all" src="final-jogo-acertou-tudo.mp3"></audio>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
